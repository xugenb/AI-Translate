<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>AI 翻译助手</h1>
      <span class="version">v1.0</span>
    </header>

    <section class="section">
      <h2>API 配置</h2>
      <div class="form-group">
        <label>提供商</label>
        <select id="provider-select"></select>
      </div>
      <div class="form-group">
        <label>模型</label>
        <select id="model-select"></select>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="输入 API Key">
      </div>
      <button id="save-api-btn" class="btn-primary">保存</button>
      <span id="save-status" class="status"></span>
    </section>

    <section class="section">
      <h2>自定义提供商</h2>
      <div id="custom-providers-list"></div>
      <div class="custom-provider-form">
        <input type="text" id="new-provider-name" placeholder="名称 (如 My Provider)">
        <input type="text" id="new-provider-base-url" placeholder="API Base URL (如 https://api.openai.com/v1)">
        <input type="text" id="new-provider-model" placeholder="模型名称 (如 gpt-4o)">
        <input type="password" id="new-provider-key" placeholder="API Key">
        <button id="add-provider-btn" class="btn-secondary">添加</button>
      </div>
    </section>

    <section class="section">
      <h2>翻译触发</h2>
      <label class="checkbox-label">
        <input type="checkbox" id="trigger-bubble"> 划词气泡按钮
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="trigger-instant"> 即时划词翻译
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="trigger-shortcut"> 快捷键 (Alt+T)
      </label>
    </section>

    <section class="section">
      <h2>展示样式</h2>
      <div class="radio-group">
        <label><input type="radio" name="display" value="bubble"> 气泡卡片</label>
        <label><input type="radio" name="display" value="panel"> 侧边面板</label>
        <label><input type="radio" name="display" value="inline"> 原生下嵌</label>
      </div>
    </section>

    <section class="section">
      <h2>语言偏好</h2>
      <div class="form-group">
        <label>源语言</label>
        <select id="source-lang-select">
          <option value="auto">自动检测</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <div class="form-group">
        <label>目标语言</label>
        <select id="target-lang-select">
          <option value="zh">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
        </select>
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="remember-site"> 记忆网站偏好
      </label>
    </section>

    <section class="section">
      <h2>高级</h2>
      <div class="btn-group">
        <button id="manage-keys-btn" class="btn-secondary">管理 API Keys</button>
        <button id="export-btn" class="btn-secondary">导出配置</button>
        <button id="import-btn" class="btn-secondary">导入配置</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
